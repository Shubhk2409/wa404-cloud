<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WA 404 | Cloud Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .terminal-log { background: #000; color: #0f0; padding: 1rem; height: 300px; overflow-y: scroll; font-family: monospace; border-radius: 8px; border: 1px solid #333; margin-top: 2rem; }
    </style>
</head>
<body>
    <div class="app-container" style="display: flex; flex-direction: column; max-width: 1000px; margin: 0 auto; padding: 2rem;">
        
        <header class="top-nav glass-panel" style="margin-left: 0; justify-content: space-between; border-radius: 12px; margin-bottom: 2rem;">
            <div class="logo-area" style="padding: 0;">
                <h2 style="margin: 0;">WA <span class="accent">404</span> <span style="font-size: 1rem; color: #888;">Cloud Version</span></h2>
            </div>
            <div class="user-profile">
                Status: <span id="conn-status" class="status-badge disconnected" style="margin-left: 10px;">Connecting...</span>
                <button id="logout-btn" class="btn btn-danger btn-sm" style="margin-left: 10px; display: none;">Logout</button>
            </div>
        </header>

        <!-- QR Modal Display for single device -->
        <div id="qr-box" class="glass-panel text-center" style="padding: 3rem; margin-bottom: 2rem; display: none;">
            <h3>Scan QR Code to Connect</h3>
            <p class="text-muted">Link a device in WhatsApp Web settings</p>
            <div id="qrcode-render" style="background: white; padding: 10px; display: inline-block; border-radius: 8px; margin-top: 1rem;"></div>
        </div>

        <div class="tab-buttons" style="display: flex; gap: 1rem; margin-bottom: 1rem;">
            <button class="btn btn-primary" onclick="showTab('shoot')">Bulk Shoot</button>
            <button class="btn btn-primary" onclick="showTab('extract')">Contact Extractor</button>
        </div>

        <!-- Bulk Shoot Tab -->
        <div id="tab-shoot" class="glass-panel tab-content" style="padding: 2rem;">
            <h2 class="mb-3">Bulk Shoot Terminal</h2>
            <form id="bulk-form">
                <div class="mb-3" style="display: flex; gap: 1rem;">
                    <div style="flex: 1;">
                        <label>Upload Contacts (CSV)</label>
                        <input type="file" id="csv-file" accept=".csv" class="form-control" style="width: 100%; padding: 0.5rem; background: rgba(0,0,0,0.3); color: white; border: 1px solid var(--panel-border); border-radius: 4px;">
                        <small class="text-muted">Header 'phone' required</small>
                    </div>
                    <div style="flex: 1;">
                        <label>Manual Numbers (Comma separated)</label>
                        <textarea id="manual-nums" rows="2" class="form-control" placeholder="919876543210..." style="width: 100%; padding: 0.5rem; background: rgba(0,0,0,0.3); color: white; border: 1px solid var(--panel-border); border-radius: 4px;"></textarea>
                    </div>
                </div>

                <div class="mb-3">
                    <label>Message Body</label>
                    <textarea id="msg-body" rows="4" class="form-control" placeholder="Enter message text here..." style="width: 100%; padding: 0.5rem; background: rgba(0,0,0,0.3); color: white; border: 1px solid var(--panel-border); border-radius: 4px;"></textarea>
                </div>

                <div class="mb-3">
                    <label>Attachment (Image/Video/PDF)</label>
                    <input type="file" id="media-file" class="form-control" style="width: 100%; padding: 0.5rem; background: rgba(0,0,0,0.3); color: white; border: 1px solid var(--panel-border); border-radius: 4px;">
                </div>

                <button type="submit" class="btn btn-primary mt-3" style="width: 100%; padding: 1rem;">START SHOOT</button>
            </form>

            <div class="terminal-log" id="log-console">
                <div>[SYSTEM] Waiting for commands...</div>
            </div>
        </div>

        <!-- Extractor Tab -->
        <div id="tab-extract" class="glass-panel tab-content" style="padding: 2rem; display: none;">
            <h2 class="mb-3">Contact Extractor</h2>
            <p class="text-muted mb-3">Extract participants from all Groups and Chats connected to this session.</p>
            <button id="extract-btn" class="btn btn-primary">Start Extraction</button>
            <div id="extractor-status" class="mt-3"></div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/render_app.js"></script>
</body>
</html>
